name: pertemuan6
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Library PDF diletakkan di sini (sejajar dengan cupertino_icons)
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Tambahkan bagian assets ini agar aplikasi bisa membaca file PDF Anda
  assets:
    - assets/pdf/